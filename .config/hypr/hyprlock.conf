background {
    # Force it to render strictly on your integrated Lenovo panel
    monitor = eDP-1                             
    
    # A safe flat color eliminates the "Oopsie daisy" wake-up memory cache crash
    color = rgb(20, 20, 20)                     
    blur_passes = 0
    fade_on_empty = false
}

input-field {
    monitor = eDP-1
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.26
    dots_spacing = 0.15
    dots_center = true
    
    # Critical stability flag: prevents keyboard spikes from locking up the buffer
    ignore_empty_input = true                   
    
    fade_on_empty = false
    font_color = rgb(200, 200, 200)
    inner_color = rgb(30, 30, 30)
    outer_color = rgb(45, 45, 45)
    placeholder_text = <i>Enter Password...</i>
}
